services:
  - type: web
    name: contourcast-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://castingcompass.com
      - key: DATA_ROOT
        value: /app
      - key: PYTHONUNBUFFERED
        value: "1"
