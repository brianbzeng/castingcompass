name: Refresh public forecast snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: contourcast-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/generate_snapshot.py
      - name: Validate generated data
        run: |
          python -m json.tool data/sites.json >/dev/null
          python -m json.tool public/data/sites.json >/dev/null
          python -m json.tool public/data/opportunities.json >/dev/null
      - name: Commit a changed snapshot
        run: |
          if git diff --quiet -- public/data; then
            exit 0
          fi
          git config user.name "contourcast-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          git commit -m "data: refresh 72-hour opportunity snapshot"
          git push
