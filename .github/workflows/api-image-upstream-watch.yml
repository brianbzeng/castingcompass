name: API image upstream watch

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-image-upstream-watch
  cancel-in-progress: true

jobs:
  official-source-watch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
      - name: Compare the pinned API image with official upstream sources
        run: node scripts/audit-api-image-upstream.mjs audit-live
