name: Optional Python research stacks

on:
  pull_request:
    paths:
      - .github/workflows/optional-python.yml
      - pipeline/contourcast/**
      - pipeline/requirements-geo-deep.in
      - pipeline/requirements-geo-deep-*.lock
      - pipeline/scripts/check_geo_deep_environment.py
      - pipeline/tests/**
      - scripts/generate-python-locks.mjs
  push:
    branches: [main]
    paths:
      - .github/workflows/optional-python.yml
      - pipeline/contourcast/**
      - pipeline/requirements-geo-deep.in
      - pipeline/requirements-geo-deep-*.lock
      - pipeline/scripts/check_geo_deep_environment.py
      - pipeline/tests/**
      - scripts/generate-python-locks.mjs
  schedule:
    - cron: "33 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-cpu:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: pipeline/requirements-geo-deep-linux-cpu.lock
      - run: >-
          python -m pip install --disable-pip-version-check --only-binary=:all:
          --require-hashes --index-url https://pypi.org/simple
          --extra-index-url https://download.pytorch.org/whl/cpu
          -r pipeline/requirements-geo-deep-linux-cpu.lock
      - run: python -m pip check
      - run: python -m ruff check pipeline scripts
      - run: python -W error::FutureWarning -W error::DeprecationWarning -m unittest discover -s pipeline/tests -v
      - run: python -m pipeline.contourcast.cli deep-smoke
      - run: >-
          python -W error::FutureWarning -W error::DeprecationWarning
          pipeline/scripts/check_geo_deep_environment.py
        env:
          CC_OPTIONAL_STACK: linux-cpu

  macos-arm64:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.11"
          python-version: "3.12.13"
          enable-cache: true
          cache-python: true
          cache-dependency-glob: pipeline/requirements-geo-deep-macos-arm64.lock
      - run: uv python install 3.12.13
      - run: uv venv --python 3.12.13 --seed .venv
      - run: >-
          .venv/bin/python -m pip install --disable-pip-version-check --only-binary=:all:
          --require-hashes --index-url https://pypi.org/simple
          -r pipeline/requirements-geo-deep-macos-arm64.lock
      - run: .venv/bin/python -m pip check
      - run: .venv/bin/python -m ruff check pipeline scripts
      - run: .venv/bin/python -W error::FutureWarning -W error::DeprecationWarning -m unittest discover -s pipeline/tests -v
      - run: .venv/bin/python -m pipeline.contourcast.cli deep-smoke
      - run: >-
          .venv/bin/python -W error::FutureWarning -W error::DeprecationWarning
          pipeline/scripts/check_geo_deep_environment.py
        env:
          CC_OPTIONAL_STACK: macos-arm64
