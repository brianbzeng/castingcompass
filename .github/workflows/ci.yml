name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    # GitHub's dependency graph is built from the default branch. Stacked PRs
    # run the lockfile audits/SBOM gates below; the graph diff runs at release.
    if: github.event_name == 'pull_request' && github.base_ref == github.event.repository.default_branch
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm run security:secrets
      - run: node scripts/verify-npm-install-policy.mjs
      - run: npm ci --ignore-scripts
      - run: npm run security:dependencies
      - run: npm run security:sbom
      - run: npm run security:release-sbom
      - run: npm run security:exercise-policy
      - run: npm run security:cloudflare-provider-state
      - run: npm run security:observability-activation
      - run: npm run security:production-change-policy
      - run: npm run security:santa-barbara-access-review
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:mobile

  api:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"
          cache: pip
          cache-dependency-path: services/api/requirements-test.lock
      - run: 'python -m pip install --disable-pip-version-check --only-binary=:all: --require-hashes -r services/api/requirements-test.lock'
      - run: python scripts/check_d1_query_plans.py
      - run: python -m pytest services/api/tests -q

  pipeline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: pipeline/requirements-ci.lock
      - run: 'python -m pip install --disable-pip-version-check --only-binary=:all: --require-hashes -r pipeline/requirements-ci.lock'
      - run: python -m ruff check services/api pipeline scripts
      - run: python -W error::FutureWarning -W error::DeprecationWarning -m unittest discover -s pipeline/tests -v
      - run: python -m pipeline.contourcast.cli smoke --output-dir /tmp/contourcast-smoke --seed 42 --observations 160

  dependency-submission:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api, pipeline]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
      - run: node scripts/generate-python-locks.mjs --check
      - run: node scripts/submit-python-dependency-snapshot.mjs --submit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
