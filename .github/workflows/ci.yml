name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r services/api/requirements.txt
      - run: python -m pytest services/api/tests -q

  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r pipeline/requirements-smoke.txt
      - run: pip install ruff
      - run: ruff check services/api pipeline scripts
      - run: python -m unittest discover -s pipeline/tests -v
      - run: python -m pipeline.contourcast.cli smoke --output-dir /tmp/contourcast-smoke --seed 42 --observations 160
