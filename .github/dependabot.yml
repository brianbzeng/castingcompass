version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      fastapi-stack:
        patterns:
          - fastapi
          - starlette
      psycopg-family:
        patterns:
          - psycopg
          - psycopg-binary
          - psycopg-pool

  - package-ecosystem: pip
    directory: /pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
