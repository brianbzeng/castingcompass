version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react-framework:
        patterns:
          - next
          - eslint-config-next
          - react
          - react-dom
          - react-server-dom-webpack
      cloudflare-toolchain:
        patterns:
          - "@cloudflare/vite-plugin"
          - wrangler
      tailwind-toolchain:
        patterns:
          - "@tailwindcss/postcss"
          - tailwindcss
    ignore:
      - dependency-name: eslint
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      fastapi-stack:
        patterns:
          - fastapi
          - starlette
      psycopg-family:
        patterns:
          - psycopg
          - psycopg-binary
          - psycopg-pool

  - package-ecosystem: pip
    directory: /pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      scientific-runtime:
        patterns:
          - numpy
          - scipy
          - scikit-learn
          - pandas
          - joblib
          - narwhals
          - threadpoolctl
      geo-deep-runtime:
        patterns:
          - pyproj
          - rasterio
          - torch

  - package-ecosystem: docker
    directory: /services/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
